  name: kz-002-dx-gap-in-dna-kernel-quick-s
spec:
  body: "DX gap in DNA: Kernel.quick(scope) is tenant-blind, so per-tenant composition\
    \ requires hand-rolling the full FS kernel (source+cache+resolver+extension load)\
    \ just to pass a tenant. A Kernel.quick(scope, tenant=...) convenience would remove\
    \ the footgun for anyone prototyping tenancy. Surfaced while building proto-tenant-overlays;\
    \ adoption\u2192evolution loop."
  work_item: Story/proto-tenant-overlays
