spec:
  description: Roteiro de teste de s-decompose-prompts (derivado das acceptance_criteria).
  kind_of_test: smoke
  status: active
  steps:
  - action: 'No Studio, valide: Given the helpdesk scope, when concierge-grounded
      and concierge-ungrounded compose, then both embed one shared Soul (souls/concierge)
      and keep only their variant delta in the agent instruction'
    where: "<rota/tela \u2014 ex. /scopes/:scope/...>"
    expected: "<o que voc\xEA V\xCA quando est\xE1 certo (marque \u2717 S\xD3 se estiver\
      \ quebrado)>"
  - action: 'No Studio, valide: Given the composed prompts, when the citation duty
      (grounded) and the never-claim-a-write rule (platform/HITL) apply, then they
      come from Guardrail documents wired via the agents'' guardrails field, visible
      as Guardrail sections in the prompt'
    where: "<rota/tela \u2014 ex. /scopes/:scope/...>"
    expected: "<o que voc\xEA V\xCA quando est\xE1 certo (marque \u2717 S\xD3 se estiver\
      \ quebrado)>"
  - action: "No Studio, valide: Given the retired byte gate, when a semantic contract\
      \ is violated (e.g. citation duty removed), then dna eval run helpdesk-prompts\
      \ exits 1 \u2014 proven with a planted violation"
    where: "<rota/tela \u2014 ex. /scopes/:scope/...>"
    expected: "<o que voc\xEA V\xCA quando est\xE1 certo (marque \u2717 S\xD3 se estiver\
      \ quebrado)>"
  - action: 'No Studio, valide: Given the backend consumers (app/agents/concierge.py,
      workflow), when prompts.py composes the new structure, then the public constant
      surface still satisfies them and the backend eval gates stay green'
    where: "<rota/tela \u2014 ex. /scopes/:scope/...>"
    expected: "<o que voc\xEA V\xCA quando est\xE1 certo (marque \u2717 S\xD3 se estiver\
      \ quebrado)>"
