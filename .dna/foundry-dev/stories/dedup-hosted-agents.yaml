apiVersion: github.com/ruinosus/dna/sdlc/v1
kind: Story
metadata:
  name: dedup-hosted-agents
spec:
  title: "Dedup hosted agents \u2014 compose prompts from the DNA scope"
  description: The 4 apps/hosted-* stop shipping byte-copies of the prompts and compose
    from apps/backend/.dna via build_prompt (kills real drift)
  status: in-progress
  feature: dna-adoption
  priority: high
  labels:
  - dna
  - refactor
  reporter: claude-code
  acceptance_criteria:
  - Given the 4 hosted containers, when they boot, then each composes its instruction
    from the DNA scope via build_prompt (no inline prompt string constant remains)
  - Given resolve drifted intentionally (hosted has no HITL), when hosted-agent composes
    RESOLVE, then it uses a new resolve-hosted Agent variant WITHOUT the TICKET/STEP
    logic, while the backend keeps resolve WITH it
  - Given the composed prompts, when the helpdesk-prompts eval suite runs, then new/existing
    cases assert the right sentinels per hosted (resolve-hosted !TICKET, platform
    Guardrail section, pt-BR, triage/retrieve contracts)
  acceptance_criteria_source: claude-code
  definition_of_done:
  - 'Code: 4 hosted main.py compose via a prompts.py shim mirroring apps/backend/app/agents/prompts.py;
    dna-sdk added to each requirements.txt'
  - 'Data: apps/backend/.dna/helpdesk/agents/resolve-hosted.yaml created; resolve-hosted
    eval-case added to the helpdesk-prompts suite'
  - 'Tests: dna eval run helpdesk-prompts green with new cases; hosted_build_test
    + hosted_platform_smoke_test still pass; a composition test proves each hosted
    shim composes the right agent'
  - 'CI: ''CI passed'' green on the PR (the dna eval step picks up the new cases automatically)'
  definition_of_done_source: claude-code
