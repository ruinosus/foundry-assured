      \ se\xE7\xE3o no README do backend, ADR-014 escrito + linkado do ADR-013 e do\
      \ \xEDndice de ADRs. Prova de produto executada no n\xEDvel do processo (o daemon\
      \ docker local est\xE1 inoperante \u2014 disco do host 100% + containerd corrompido;\
      \ recovery negado pelo permission system): compose config valida o compose.yaml;\
      \ import de app.agents.prompts (m\xF3dulo REAL do produto) comp\xF4s COCKPIT_INSTRUCTIONS,\
      \ editei o cockpit.yaml no host com linha-marcador, novo processo (= restart)\
