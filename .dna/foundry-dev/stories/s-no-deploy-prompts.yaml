      \ composi\xE7\xE3o byte-id\xEAntica ao antes. Nenhum build de imagem em momento\
      \ algum. Gap ambiental: o mesmo roteiro dentro do container (docker compose\
      \ up \u2192 edit \u2192 restart) fica pendente de smoke quando o docker local\
      \ voltar."
