      \ \xE9 um bind mount de ./apps/backend/.dna (volume sobrep\xF5e o COPY) e a\
      \ imagem continua self-contained sem o mount"
    done: true
    done_at: '2026-07-10T19:36:05+00:00'
    done_by: story-done-auto
  - text: "Dado um prompt editado em .dna/helpdesk no host, quando o processo reinicia\
      \ (restart, sem docker build), ent\xE3o o prompt composto reflete a mudan\xE7\
      a \u2014 evid\xEAncia com diff do prompt composto antes/depois"
    done: true
    done_at: '2026-07-10T19:36:05+00:00'
    done_by: story-done-auto
  - text: "Dado o ADR-014, quando lido, ent\xE3o documenta o modelo: board dev-time\
