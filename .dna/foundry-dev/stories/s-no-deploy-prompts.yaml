spec:
  title: 'Prompts sem rebuild: volume mount do .dna no container'
  description: "Fase 3 do piloto DNA: mudar um YAML em apps/backend/.dna/helpdesk\
    \ N\xC3O pode exigir rebuild da imagem. Decis\xE3o ratificada: volume mount primeiro\
    \ (bind ./apps/backend/.dna sobre /app/.dna, COPY continua como fallback self-contained);\
    \ refresh = restart do processo (agents s\xE3o constru\xEDdos no boot e as constantes\
    \ comp\xF5em no import \u2014 hot-reload in-process n\xE3o alcan\xE7aria agentes\
    \ j\xE1 constru\xEDdos). PG source (DNA_SOURCE_URL, adapter j\xE1 existe no dna-sdk\
    \ 0.1.0) fica documentado como evolu\xE7\xE3o multi-r\xE9plica, N\xC3O implementado."
  status: done
  feature: f-dna-adoption
  owner: claude-code
  priority: high
