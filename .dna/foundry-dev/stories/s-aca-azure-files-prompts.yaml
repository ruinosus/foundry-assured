kind: Story
metadata:
  name: s-aca-azure-files-prompts
spec:
  title: "Prompts sem redeploy em PRODU\xC7\xC3O: Azure Files mount no ACA"
  description: "Continua\xE7\xE3o nomeada do ADR-014: em prod (azd/ACA) o scope .dna/helpdesk\
    \ ainda \xE9 cozido na imagem \u2014 mudar um prompt = rebuild+redeploy. Montar\
    \ um Azure Files share (read-only) no container app do backend em path alternativo\
    \ (/mnt/dna) + env var DNA_BASE_DIR selecionando; COPY na imagem permanece como\
    \ fallback (share vazio/ausente \u2260 app quebrado). Loop de prod: editar YAML\
    \ \u2192 upload pro share \u2192 az containerapp revision restart."
  status: done
  feature: f-dna-adoption
  owner: claude-code
  priority: high
  labels:
  - dna
  - runtime
  - infra
  - aca
  reporter: claude-code
  acceptance_criteria:
  - text: "Dado o bicep provisionado, quando o backend sobe no ACA, ent\xE3o um Azure\
      \ Files share (assured-prompts) est\xE1 montado read-only em /mnt/dna e DNA_BASE_DIR=/mnt/dna\
      \ aponta pra ele"
    done: true
    done_at: '2026-07-10T21:02:56+00:00'
    done_by: story-done-auto
  - text: "Dado um share vazio ou ausente (provision fresco, ningu\xE9m publicou),\
      \ quando o backend boota, ent\xE3o ele comp\xF5e do scope cozido na imagem (/app/.dna)\
      \ com log expl\xEDcito do fallback \u2014 boot N\xC3O quebra"
    done: true
    done_at: '2026-07-10T21:02:56+00:00'
    done_by: story-done-auto
  - text: "Dado um share seedado com o scope helpdesk, quando o backend (re)boota,\
      \ ent\xE3o os prompts compostos v\xEAm do share; se o scope no share existir\
      \ mas estiver quebrado, o boot falha ALTO (fail-loud do ADR-013, sem fallback\
      \ silencioso)"
    done: true
    done_at: '2026-07-10T21:02:56+00:00'
    done_by: story-done-auto
  - text: "Dado o runbook/script de scripts/, quando o operador roda o fluxo editar\
      \ \u2192 upload-batch \u2192 revision restart, ent\xE3o o prompt novo est\xE1\
      \ em vigor sem build de imagem \u2014 restart \xE9 a unidade de refresh (ADR-014),\
      \ sem promessa de hot-reload"
    done: true
    done_at: '2026-07-10T21:02:56+00:00'
    done_by: story-done-auto
  acceptance_criteria_source: claude-code
  definition_of_done:
  - text: "Bicep: share em resources.bicep + storage link ReadOnly no environment\
      \ + volume/mount + env var em containerapps.bicep; managedApp.bicep re-parametrizado;\
      \ bicep build limpo em main.bicep E managedApp.bicep (job CI Infra \xB7 bicep\
      \ build \xE9 o gate)"
    done: true
    done_at: '2026-07-10T21:02:56+00:00'
    done_by: story-done-auto
  - text: "Backend: prompts.py honra DNA_BASE_DIR com sem\xE2ntica ausente\u2192fallback-logado\
      \ / presente-mas-quebrado\u2192fail-loud; comportamento local/compose byte-id\xEA\
      ntico sem a env var; ruff limpo"
    done: true
    done_at: '2026-07-10T21:02:56+00:00'
    done_by: story-done-auto
  - text: "Script scripts/push-prompts.sh (upload-batch + revision restart via azd\
      \ env) + runbook documentado; ADR-014 atualizado (se\xE7\xE3o produ\xE7\xE3\
      o/ACA sai de follow-up pro design implementado, com justificativa do path alternativo\
      \ vs mount-por-cima)"
    done: true
    done_at: '2026-07-10T21:02:56+00:00'
    done_by: story-done-auto
  - text: "TestGuide --product marcando o que foi validado offline + TestRun com o\
      \ que rodou; passo de deploy real documentado como pend\xEAncia do dono no PR\
      \ body; PR via story pr --base main com CI passed verde \u2014 N\xC3O mergear,\
      \ N\xC3O marcar done"
    done: true
    done_at: '2026-07-10T21:02:56+00:00'
    done_by: story-done-auto
