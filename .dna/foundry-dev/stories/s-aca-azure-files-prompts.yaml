      \ regenerado via build.sh; (4) prompts.py: _resolve_base_dir com sem\xE2ntica\
      \ assim\xE9trica (unset\u2192baked byte-id\xEAntico; scope ausente\u2192fallback\
      \ logado; presente\u2192ganha e quebrado\u2192fail-loud). ACHADO no caminho:\
      \ bug latente PR\xC9-EXISTENTE \u2014 build_prompt de agent inexistente RETORNA\
      \ a string \"Agent 'x' not found\" (dna-sdk prompt_kernel.py:161) em vez de\
      \ levantar \u2192 passava no empty-check e virava a instruction literal do agente.\
      \ Endurecido no shim: mi.one('Agent', name) is None \u2192 RuntimeError (cobre\
      \ agent deletado/renomeado/imparse\xE1vel em QUALQUER modo). (5) scripts/push-prompts.sh:\
      \ upload-batch + revision restart lendo azd env (--mirror pra remo\xE7\xF5es,\
