      \ m\xF3dulos \u2192 param novo tem que ser passado l\xE1 tamb\xE9m (CI s\xF3\
      \ compila main.bicep; build local nos dois). Contrato do backend: prompts.py\
      \ fixa _DNA_BASE_DIR sem env var; o CI j\xE1 usa DNA_BASE_DIR pro dna CLI com\
      \ a mesma sem\xE2ntica \u2192 nome escolhido. DECIS\xC3O: mount em path alternativo\
      \ /mnt/dna + env DNA_BASE_DIR (N\xC3O por cima de /app/.dna \u2014 no ACA o\
      \ volume sombreia o dir da imagem; share vazio em provision fresco = crash-loop\
      \ at\xE9 seed). Sem\xE2ntica: env ausente \u2192 hoje byte-id\xEAntico; scope\
      \ ausente no share \u2192 fallback logado pro cozido; scope presente mas quebrado\
      \ \u2192 fail-loud (ADR-013, sem fallback silencioso). Refresh = revision restart\
      \ (mesma unidade do ADR-014)."
