spec:
  title: "Adopt dna-sdk v0.5 \u2014 collapse prompt shims onto load_prompts"
  description: "Bump dna-sdk 0.1/0.3 \u2192 0.5 and replace Kernel.quick+build_prompt+manual-guards\
    \ shims with dna.load_prompts across backend + hosted apps"
  status: in-progress
  feature: f-dna-adoption
  priority: high
  labels:
  - dna
  - refactor
  reporter: claude-code
  acceptance_criteria:
  - Given the foundry backend + 4 hosted apps, When dna-sdk is bumped to >=0.5,<0.6
    (pyproject + requirements + CI), Then uv.lock regenerates and all eval suites
    (helpdesk/copilot/studio/wiki) + compose-tests pass under 0.5
  - Given each prompt shim, When refactored to dna.load_prompts(scope, base_dir=<resolved>),
    Then the composed prompt is byte-identical (same eval sentinels) and the ADR-014
    _resolve_base_dir policy is preserved
  acceptance_criteria_source: cli-create
  definition_of_done:
  - 'Code: 8 shims collapsed onto load_prompts; ADR-014 base_dir resolution preserved;
    template/skills-dir extras kept'
  - 'Tests: helpdesk(10)+copilot(5)+studio(1)+wiki(3) eval suites + hosted/copilot/studio-wiki
    compose-tests green under 0.5; backend pytest green; backend boots'
  - 'CI: ''CI passed'' green on PR opened via story pr --base develop'
  - "Docs: line-count before\u2192after per shim reported as the DX proof"
  definition_of_done_source: cli-create
