apiVersion: github.com/ruinosus/dna/sdlc/v1
kind: Story
metadata:
  name: s-decompose-prompts
spec:
  title: Decompose concierge prompts into Soul + Guardrails (post byte-lock)
  description: 'Phase 2 of the DNA pilot: the byte-fidelity lock died with PR #104,
    so the nine helpdesk prompts can now EVOLVE. Extract the shared concierge persona
    into a Soul, extract cross-cutting rules (grounded citation duty, HITL never-claim-a-write)
    into Guardrail kinds wired on the agents, retire the byte-exact golden test, and
    move the guard duty to semantic invariants in the DNA eval suite.'
  status: in-progress
  feature: f-dna-adoption
  priority: high
  labels:
  - dna
  - prompts
  - adr-013
  acceptance_criteria:
  - Given the helpdesk scope, when concierge-grounded and concierge-ungrounded compose,
    then both embed one shared Soul (souls/concierge) and keep only their variant
    delta in the agent instruction
  - Given the composed prompts, when the citation duty (grounded) and the never-claim-a-write
    rule (platform/HITL) apply, then they come from Guardrail documents wired via
    the agents' guardrails field, visible as Guardrail sections in the prompt
  - "Given the retired byte gate, when a semantic contract is violated (e.g. citation\
    \ duty removed), then dna eval run helpdesk-prompts exits 1 \u2014 proven with\
    \ a planted violation"
  - Given the backend consumers (app/agents/concierge.py, workflow), when prompts.py
    composes the new structure, then the public constant surface still satisfies them
    and the backend eval gates stay green
  acceptance_criteria_source: cli-create
  definition_of_done:
  - Soul + Guardrail documents exist in apps/backend/.dna/helpdesk and are referenced
    by the agents
  - eval/prompts_equivalence_test.py retired (removed with explanation); CI step replaced
    by the expanded dna eval suite
  - 'EvalCases updated: grounded requires citation, ungrounded forbids it (not_contains),
    HITL never claims a write, TICKET:/NO_MATCH sentinels and pt-BR discipline intact'
  - Backend policy gates green locally (run_eval --self-test, test_attribution); planted
    violation exit-1 proof recorded on the story timeline
  - 'Docs updated: ADR-013 addendum, eval/README, CONTRIBUTING project rule'
  definition_of_done_source: cli-create
