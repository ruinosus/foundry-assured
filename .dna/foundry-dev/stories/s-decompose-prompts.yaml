      \ vira souls/concierge (SOUL.md, formato can\xF4nico do open-swe no repo DNA);\
      \ (2) concierge-base morre \u2014 agent + constante CONCIERGE_BASE_INSTRUCTIONS:\
      \ verificado que nenhum consumidor standalone existe no backend (s\xF3 o shim\
      \ e o teste golden a expunham); (3) dever-de-cita\xE7\xE3o do grounded e never-claim-a-write\
      \ do platform viram Guardrail kinds (severity error, scope output) wired via\
      \ spec.guardrails; (4) uso promptTemplate por agent (n\xEDvel 1 da cascata)\
      \ pra manter persona-primeiro no prompt composto \u2014 o template default p\xF5\
      e instruction antes do soul; (5) o teste golden byte-exato \xE9 removido e a\
      \ eval suite vira a guarda de registro, ganhando invariantes NEGATIVOS (not_contains)\
      \ imposs\xEDveis no paradigma byte-copy \u2014 ungrounded PRO\xCDBE o dever\
      \ de cita\xE7\xE3o."
    commit_ref: 536414422d1b41248defa37d8d4b7ddffc114d76
