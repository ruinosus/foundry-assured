  - text: Backend policy gates green locally (run_eval --self-test, test_attribution);
      planted violation exit-1 proof recorded on the story timeline
    done: true
    done_at: '2026-07-10T16:33:44+00:00'
    done_by: claude-code
    evidence: commit 9912961 (decomposition + retirement + eval cases + docs); gates
