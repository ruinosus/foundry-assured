apiVersion: github.com/ruinosus/dna/sdlc/v1
kind: Story
metadata:
  name: s-decompose-prompts
spec:
  title: Decompose concierge prompts into Soul + Guardrails (post byte-lock)
  description: 'Phase 2 of the DNA pilot: the byte-fidelity lock died with PR #104,
    so the nine helpdesk prompts can now EVOLVE. Extract the shared concierge persona
    into a Soul, extract cross-cutting rules (grounded citation duty, HITL never-claim-a-write)
    into Guardrail kinds wired on the agents, retire the byte-exact golden test, and
    move the guard duty to semantic invariants in the DNA eval suite.'
  status: in-progress
  feature: f-dna-adoption
  priority: high
  labels:
  - dna
  - prompts
  - adr-013
  acceptance_criteria:
  - text: Given the helpdesk scope, when concierge-grounded and concierge-ungrounded
      compose, then both embed one shared Soul (souls/concierge) and keep only their
      variant delta in the agent instruction
    done: true
    done_at: '2026-07-10T16:33:43+00:00'
    done_by: claude-code
    evidence: 'commit 9912961: souls/concierge + guardrails/{grounded-citation,no-write-claims}
      wired via spec.soul/spec.guardrails; agents keep only variant delta'
  - text: Given the composed prompts, when the citation duty (grounded) and the never-claim-a-write
      rule (platform/HITL) apply, then they come from Guardrail documents wired via
      the agents' guardrails field, visible as Guardrail sections in the prompt
    done: true
    done_at: '2026-07-10T16:33:43+00:00'
    done_by: claude-code
    evidence: 'commit 9912961: souls/concierge + guardrails/{grounded-citation,no-write-claims}
      wired via spec.soul/spec.guardrails; agents keep only variant delta'
  - text: "Given the retired byte gate, when a semantic contract is violated (e.g.\
      \ citation duty removed), then dna eval run helpdesk-prompts exits 1 \u2014\
      \ proven with a planted violation"
    done: true
    done_at: '2026-07-10T16:33:43+00:00'
    done_by: claude-code
    evidence: "planted violation (guardrail unwired from concierge-grounded) \u2192\
      \ dna eval run exit=1 with 5 failed checks; restored \u2192 exit=0; also green\
      \ on the CI-pinned dna-cli 3628a9ee"
  - text: Given the backend consumers (app/agents/concierge.py, workflow), when prompts.py
      composes the new structure, then the public constant surface still satisfies
      them and the backend eval gates stay green
    done: true
    done_at: '2026-07-10T16:33:44+00:00'
    done_by: claude-code
    evidence: shim exposes 8 constants; run_eval --self-test + test_attribution green;
      consumers unchanged
  acceptance_criteria_source: cli-create
  definition_of_done:
  - text: Soul + Guardrail documents exist in apps/backend/.dna/helpdesk and are referenced
      by the agents
    done: true
    done_at: '2026-07-10T16:33:44+00:00'
    done_by: claude-code
    evidence: commit 9912961 (decomposition + retirement + eval cases + docs); gates
      evidence on timeline
  - text: eval/prompts_equivalence_test.py retired (removed with explanation); CI
      step replaced by the expanded dna eval suite
    done: true
    done_at: '2026-07-10T16:33:44+00:00'
    done_by: claude-code
    evidence: commit 9912961 (decomposition + retirement + eval cases + docs); gates
      evidence on timeline
  - text: 'EvalCases updated: grounded requires citation, ungrounded forbids it (not_contains),
      HITL never claims a write, TICKET:/NO_MATCH sentinels and pt-BR discipline intact'
    done: true
    done_at: '2026-07-10T16:33:44+00:00'
    done_by: claude-code
    evidence: commit 9912961 (decomposition + retirement + eval cases + docs); gates
