metadata:
  name: s-official-packages
spec:
  title: "dna-sdk: git-dep \u2192 pacote oficial do PyPI"
  description: "O DNA publicou 0.1.0 no PyPI (dna-sdk + dna-cli). Trocar a git-dep\
    \ commit-pinada do backend pelo range oficial dna-sdk>=0.1,<0.2, remover o aparato\
    \ que s\xF3 existia pela git-dep (allow-direct-references, git na imagem Docker,\
    \ pins git no CI/CONTRIBUTING) e atualizar o ADR-013."
  status: review
  feature: f-dna-adoption
  owner: claude-code
  priority: high
  labels:
  - dna
  - deps
  - docker
  reporter: claude-code
  acceptance_criteria:
  - "Dado o pyproject do backend, quando as deps resolvem, ent\xE3o dna-sdk vem do\
    \ PyPI como dna-sdk>=0.1,<0.2 (sem git-dep, sem allow-direct-references) e o uv.lock\
    \ aponta pra files.pythonhosted.org"
  - "Dado o Dockerfile do backend, quando a imagem builda, ent\xE3o ela N\xC3O instala\
    \ git (nada mais no build precisa dele) e o docker build local passa"
  - "Dado o CI, quando o job backend roda, ent\xE3o o passo 'dna eval run' instala\
    \ dna-cli 0.1.0 do PyPI (sem ref git) e a suite helpdesk-prompts passa"
  - "Dado o dna-sdk 0.1.0 do PyPI, quando os 8 prompts comp\xF5em, ent\xE3o s\xE3\
    o byte-id\xEAnticos aos compostos pelo SHA pinado 3628a9ee (evid\xEAncia de equival\xEA\
    ncia registrada)"
  acceptance_criteria_source: cli-create
  definition_of_done:
  - pyproject + uv.lock regenerado + Dockerfile sem git
  - "ADR-013 atualizado: PyPI como caminho de install; git-dep vira nota hist\xF3\
    rica"
  - CONTRIBUTING + ci.yml sem pins git do dna
  - "Testes do backend que o CI roda passam localmente (run_eval --self-test, test_attribution,\
    \ dna eval run helpdesk-prompts) + evid\xEAncia de equival\xEAncia dos prompts"
  - TestGuide --product + TestRun registrados; PR aberto com story review
  definition_of_done_source: cli-create
