    summary: "BLOQUEIO PROVADO (spike, depois removido). Baseline: 19/19 evals verdes\
      \ sob dna 0.1.x (helpdesk 10, copilot 5, studio 1, wiki 3). Premissa da task\
      \ \xC9 FALSA neste repo: _lib est\xE1 VAZIO (s\xF3 .gitkeep), nenhum Genome\
