      \ _lib EST\xC1 no chain de studio [('studio',None),('_lib',None)], mas kernel.query\
      \ origin=all retorna [] pra Guardrail e o slot de composi\xE7\xE3o (soul/guardrail/skill)\
      \ \xE9 MANIFEST-PLANE (scan por-scope), n\xE3o query-inheritable. Resultado:\
      \ _lib guardrail/soul/skill s\xF3 comp\xF5e se fisicamente importado pelo resolver\
      \ \u2014 ausente no 'dna eval run'. Confirmado id\xEAntico em 0.1.x E 0.3.1\
      \ (n\xE3o \xE9 quest\xE3o de bump de vers\xE3o). Logo: mover qualquer regra\
      \ pro _lib + consumidor referenciar QUEBRA a sentinela do consumidor no gate\
      \ 'dna eval run' (regress\xE3o dura). O smoke Kernel.quick passaria enquanto\
      \ o eval CLI falharia \u2014 os dois caminhos DIVERGEM."
    commit_ref: ee1bac96d67713dec1ce0c98f82d3f550e4fd7e7
