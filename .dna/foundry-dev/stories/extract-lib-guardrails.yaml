      \ scope consumidor apontando pro _lib: (a) via depend\xEAncia 'local:_lib' \u2192\
      \ comp\xF5e no RUNTIME (Kernel.quick, que registra LocalResolver) mas N\xC3\
      O em 'dna eval run' (o CLI boota via Kernel.auto()+source, SEM LocalResolver\
