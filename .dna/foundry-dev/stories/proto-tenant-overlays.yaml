metadata:
  name: proto-tenant-overlays
spec:
  title: 'Prototype: per-tenant prompt/persona overlays'
  description: 'Spike proving DNA per-tenant Soul overlay: acme customizes concierge
    persona, base helpdesk untouched, no fork/redeploy'
  status: in-progress
  feature: f-dna-adoption
  priority: medium
  labels:
  - dna
  - spike
  reporter: claude-code
  acceptance_criteria:
  - Given the shared helpdesk concierge, When composed for tenant=acme, Then the persona
    reflects ACME's on-brand tone
  - Given tenant=acme has an overlay, When composed with no tenant, Then the base
    persona is returned unchanged (base intact, no fork)
  acceptance_criteria_source: cli-create
  definition_of_done:
  - Runnable demo prints base vs acme prompts side by side with real captured output
  - HTML artifact for the owner to visually compare base vs tenant
  - 'README writeup: tenancy API used, productization cost, honest gaps'
  - No production behavior changed; CI stays green
  definition_of_done_source: cli-create
  created_at: '2026-07-11T10:32:31+00:00'
