spec:
  title: "Agent-ready surface + Di\xE1taxis docs site (repo quality standard)"
  description: "Elevate foundry-assured to the owner's cross-repo standard: (1) agent-ready\
    \ onboarding via 'dna init' on the EXISTING foundry-dev board (AGENTS.md canonical\
    \ agents.md/v1 surface + dna-sdlc-cli skill projected for claude/copilot/cursor\
    \ + commit-trailer hooks), reconciling the rich existing CLAUDE.md as a pointer/complement\
    \ rather than a duplicate; (2) a navigable MkDocs Material site organized by Di\xE1\
    taxis (tutorials/how-to/reference/explanation) that REUSES the existing docs/\
    \ (35 items), ADRs, and wiki without losing content; (3) guards + CI (mkdocs build\
    \ --strict + link-check as a SEPARATE job, never breaking the required 'CI passed')\
    \ + GitHub Pages publish. Preserve the product nature (Azure/FastAPI/React SaaS)\
    \ \u2014 form of DNA, content of foundry."
  status: in-progress
  feature: f-dna-adoption
  reporter: claude-code
  acceptance_criteria:
  - Given the repo, when 'dna init --scope foundry-dev --tools claude,copilot,cursor'
    runs, then AGENTS.md exists as the canonical surface reflecting foundry's real
    build/test/deploy + gitflow + SDLC, the dna-sdlc-cli skill is projected into .claude/.github/.cursor,
    hooks are wired, and the existing CLAUDE.md is preserved and points to AGENTS.md
    (no content lost)
  - Given the AGENTS.md, when parsed by the dna-sdk agents.md/v1 reader, then it round-trips
    as a valid agents.md/v1 document (parseable)
  - "Given docs/, when the MkDocs site is built, then navigation follows Di\xE1taxis\
    \ (Tutorials/How-to/Reference/Explanation) and every existing doc (METHOD, DEPLOYMENT,\
    \ ADRs, wiki, case studies) is reachable \u2014 diff shows moves/additions, not\
    \ blind deletes"
  - Given the docs site, when 'mkdocs build --strict' runs, then it exits 0 (no broken
    internal links, no missing nav files)
  - Given CI, when the docs workflow runs, then docs build + link-check are a SEPARATE
    workflow/job that does NOT feed the required 'CI passed' check, and the existing
    CI is unchanged and green
  acceptance_criteria_source: cli-create
  definition_of_done:
  - AGENTS.md canonical + CLAUDE.md reconciled (pointer, no duplication); dna-sdlc-cli
    skill projected for 3 tools; hooks active
  - "mkdocs.yml + requirements-docs.txt + docs/index.md landing; Di\xE1taxis nav;\
    \ existing docs reused (moved/linked, not deleted)"
  - ".github/workflows/docs.yml (build --strict + lychee offline link-check + Pages\
    \ deploy main-only, continue-on-error) \u2014 separate from ci.yml"
  - README updated (DNA integrated, link to docs site) without bloat
  - mkdocs build --strict green + existing 'CI passed' green on the PR; TestGuide
    --product + TestRun recorded
  definition_of_done_source: cli-create
