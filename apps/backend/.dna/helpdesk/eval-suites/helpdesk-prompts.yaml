apiVersion: github.com/ruinosus/dna/eval/v1
kind: EvalSuite
metadata:
  name: helpdesk-prompts
  description: >-
    Offline, deterministic invariants over the composed agent prompts — THE
    guard of record since ADR-013 phase 2 (the byte-equivalence gate
    eval/prompts_equivalence_test.py was retired once the prompts started
    legitimately evolving: shared persona in souls/concierge, cross-cutting
    rules in guardrails/). Each case pins a semantic contract the backend and
    its eval policies rely on: the RESOLVE TICKET: and RETRIEVE NO_MATCH
    sentinels the workflow branches on, the grounded citation duty (wired
    Guardrail) that ASSERT enforces, the ungrounded variant FORBIDDING that
    duty (not_contains), the platform HITL never-claim-a-write Guardrail, and
    the pt-BR grounding discipline of cockpit/selfwiki.
spec:
  cases:
  - triage-contract
  - retrieve-contract
  - resolve-contract
  - resolve-hosted
  - concierge-soul-identity
  - concierge-grounded-citation
  - concierge-ungrounded-humility
  - cockpit-discipline
  - selfwiki-discipline
  - platform-write-safety
  target:
    type: prompt
