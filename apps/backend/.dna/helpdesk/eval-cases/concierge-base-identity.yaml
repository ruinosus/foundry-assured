apiVersion: github.com/ruinosus/dna/eval/v1
kind: EvalCase
metadata:
  name: concierge-base-identity
spec:
  description: The concierge base persona names itself and its mission
  target:
    type: prompt
    agent: concierge-base
  checks:
  - type: contains
    value: Helpdesk Concierge
  - type: contains
    value: internal engineering support assistant
  - type: min_length
    value: 100
  expected: The base persona introduces the Helpdesk Concierge identity shared by both variants.
  tags: [concierge, identity]
