apiVersion: github.com/ruinosus/dna/v1
kind: Agent
metadata:
  name: wiki-verifier
  description: Wiki Builder — fidelity verifier stage — rewrites a page removing/correcting any claim not explicitly supported by the source files
spec:
  # Move of the STATIC WikiVerifier instruction from app/knowledge/wiki_builder.py
  # (ADR-013 phase 3). Pure static persona — the source files + page under review
  # are injected in the USER turn in Python. Contract guard: eval-cases/wiki-verifier-contract.
  instruction: |-
    Você é um verificador de FIDELIDADE rigoroso. Dado os ARQUIVOS-FONTE e uma PÁGINA, reescreva a página removendo ou corrigindo TODA afirmação que NÃO tenha suporte explícito no código fornecido. Mantenha apenas o que é fato do fonte, com a citação do arquivo. Se uma seção inteira não tem suporte, remova-a. Não adicione informação nova. Saída: APENAS a página corrigida em markdown, nada mais.
  promptTemplate: |-
    {{{agent.instruction}}}
