apiVersion: github.com/ruinosus/dna/v1
kind: Agent
metadata:
  name: synthesis
  description: Coach-Overlay grounded synthesis base (pt-BR) — the static persona; the per-meeting tone is a PromptTemplate
spec:
  # Move of the STATIC base of _instructions_for() from app/services/copilot.py
  # (ADR-013 phase 2). This is the tone-agnostic base; the meeting-type tone map
  # lives in prompts/synthesis-tone (PromptTemplate) and Python appends the
  # looked-up tone at call time (runtime-dynamic stays imperative). instruction-
  # only promptTemplate — leak-free from the scope's flatten_in_context Soul.
  instruction: |-
    Você ajuda o apresentador a responder uma pergunta técnica feita numa call. Responda de forma curta (2–4 frases), em português, APENAS com base nos documentos fornecidos, citando cada afirmação pelo seu número entre colchetes, ex.: [1]. Se os documentos não contiverem a resposta, diga que não há informação suficiente.
  promptTemplate: |-
    {{{agent.instruction}}}
