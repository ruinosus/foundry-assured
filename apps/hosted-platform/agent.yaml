kind: hosted
name: platform-concierge
protocols:
  - protocol: invocations
    version: 1.0.0
resources:
  cpu: "0.5"
  memory: 1Gi
environment_variables:
  # FOUNDRY_PROJECT_ENDPOINT and APPLICATIONINSIGHTS_CONNECTION_STRING are injected
  # by the platform. These resolve from the azd environment at deploy time.
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: ${FOUNDRY_MODEL}
  # The Foundry Toolbox this agent resolves its MCP tools through (ADR-011). The
  # Toolbox<->agent binding + per-connection tool config are infra-gated (deploy-time,
  # runbook); the agent references the Toolbox by name only.
  - name: FOUNDRY_TOOLBOX_NAME
    value: ${FOUNDRY_TOOLBOX_NAME}
