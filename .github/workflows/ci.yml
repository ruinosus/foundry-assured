name: CI

# Runs on every PR and on pushes to main. The hard gates (policy self-test,
# typecheck, build, bicep) must pass; lint is advisory for now (continue-on-error).
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend · lint + policy gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Lint (ruff)
        run: uvx ruff check .
        continue-on-error: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Policy gate (planted-violation self-test)
        run: uv run python -m eval.run_eval --self-test
      - name: ACL attribution round-trip (chunk key == blob key)
        run: uv run python -m eval.test_attribution
      - name: Artifact store tests
        run: |
          uv run python -m eval.artifact_store_test
          uv run python -m eval.artifact_service_test
          uv run python -m eval.artifact_rbac_test
          uv run python -m eval.artifact_studio_test
          uv run python -m eval.artifact_skills_test
          uv run python -m eval.artifact_mcp_reads_test
      # Prompt-invariant eval suite over the declarative .dna scope — THE guard
      # of record for prompt contracts (ADR-013 phase 2; the byte-equivalence
      # gate retired when the prompts started evolving as Soul + Guardrails).
      # dna-cli comes from PyPI (it pins dna-sdk>=0.1,<0.2 itself — the same
      # range the backend depends on). Offline + deterministic; exits 1 on any
      # failed case.
      # Copilot + artifact prompt composition (ADR-013 phase 2): the two
      # Python-interpolated PromptTemplates (synthesis-tone, html-artifact) are
      # not prompt targets, so their sentinels are guarded by this compose test
      # rather than the dna eval suite below.
      - name: Copilot prompt composition test
        run: uv run python -m eval.copilot_prompts_compose_test
      # Prompt-invariant eval suites over the declarative .dna scopes — THE guard
      # of record for prompt contracts (ADR-013 phase 2; the byte-equivalence
      # gate retired when the prompts started evolving as Soul + Guardrails).
      # dna-cli comes from PyPI (it pins dna-sdk>=0.1,<0.2 itself — the same
      # range the backend depends on). Offline + deterministic; exits 1 on any
      # failed case.
      - name: DNA prompt eval suites (dna eval run)
        env:
          DNA_BASE_DIR: ${{ github.workspace }}/apps/backend/.dna
        run: >-
          uvx --from "dna-cli>=0.1,<0.2"
          dna eval run helpdesk-prompts --scope helpdesk
          &&
          uvx --from "dna-cli>=0.1,<0.2"
          dna eval run copilot-prompts --scope copilot

  frontend:
    name: Frontend · typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
        continue-on-error: true
      - name: Build
        run: npm run build

  infra:
    name: Infra · bicep build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Bicep CLI
        run: |
          curl -sLo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep && sudo mv bicep /usr/local/bin/bicep
          bicep --version
      - name: Compile-check Bicep
        run: bicep build infra/main.bicep --stdout > /dev/null

  # Single required status check for branch protection — green only when all
  # matrix jobs above succeed (so you protect one check, not three).
  ci-ok:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [backend, frontend, infra]
    if: always()
    steps:
      - name: Verify all jobs passed
        run: |
          [ "${{ needs.backend.result }}" = "success" ] \
          && [ "${{ needs.frontend.result }}" = "success" ] \
          && [ "${{ needs.infra.result }}" = "success" ] \
          || { echo "One or more CI jobs failed"; exit 1; }
