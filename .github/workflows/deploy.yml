name: Deploy (Azure Container Apps)

# Deploys the backend + frontend to Azure Container Apps via azd. Two entrypoints:
#   • release: published — release-please cut a release (see release.yml) → deploy.
#   • workflow_dispatch  — manual, ad-hoc deploy.
# Both stop at the `production` Environment gate below until a reviewer approves,
# so cutting a release never deploys on its own — a human always confirms.
# Does NOT redeploy the hosted agent (that would reset its content-safety guardrail).
# Requires Azure OIDC + repo vars/secrets — see CONTRIBUTING.md › CI/CD setup.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      services:
        description: Services to deploy
        type: choice
        default: backend web
        options:
          - backend web
          - backend
          - web

permissions:
  contents: read
  id-token: write # Azure OIDC

jobs:
  deploy:
    name: azd provision + deploy
    runs-on: ubuntu-latest
    environment: production # add reviewers to this GitHub Environment to gate deploys
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
    steps:
      - uses: actions/checkout@v5
      - uses: Azure/setup-azd@v2
      - name: Install azd Foundry agents extension
        # azure.yaml declares the hosted agent (host: azure.ai.agent). azd needs the
        # azure.ai.agents extension just to PARSE that service — without it, even
        # `azd provision` (backend/web only) aborts with "unsupported host". The
        # fresh runner has no extensions; install is idempotent + GA (no alpha flag).
        run: azd extension install azure.ai.agents
      - name: azd login (OIDC)
        run: >
          azd auth login --federated-credential-provider github
          --client-id "$AZURE_CLIENT_ID" --tenant-id "$AZURE_TENANT_ID"
      - name: Configure deploy env (NEXT_PUBLIC + Entra)
        run: |
          azd env new "$AZURE_ENV_NAME" --no-prompt || azd env select "$AZURE_ENV_NAME"
          # The deployer here is the CI service principal, not a person — so the
          # deployer data-plane role assignments must use ServicePrincipal, else ARM
          # rejects them: "UnmatchedPrincipalType ... specified PrincipalType 'User'".
          azd env set AZURE_PRINCIPAL_TYPE            "ServicePrincipal"
          # AI Search was provisioned in a different region (capacity override). Without
          # this, bicep defaults it to AZURE_LOCATION and the idempotent re-provision
          # fails: "resource already exists in location eastus ... cannot be created in eastus2".
          azd env set AZURE_SEARCH_LOCATION           "${{ vars.AZURE_SEARCH_LOCATION }}"
          # selfwiki's private read audience = the app-users group. Without this the deployed backend
          # leaves APP_USERS_GROUP_ID empty → the /selfwiki ACL header isn't sent → retrieve returns 0.
          azd env set APP_USERS_GROUP_ID              "${{ vars.APP_USERS_GROUP_ID }}"
          # cockpit ACL classification groups. Without these the backend's acl_group_map is empty →
          # the /cockpit OBO ACL header isn't sent → the ACL index returns 0 authorized docs → "não sei".
          azd env set ACL_PUBLIC_GROUP                "${{ vars.ACL_PUBLIC_GROUP }}"
          azd env set ACL_INTERNAL_GROUP             "${{ vars.ACL_INTERNAL_GROUP }}"
          azd env set ACL_CONFIDENTIAL_GROUP         "${{ vars.ACL_CONFIDENTIAL_GROUP }}"
          azd env set NEXT_PUBLIC_ENTRA_TENANT_ID     "${{ vars.NEXT_PUBLIC_ENTRA_TENANT_ID }}"
          azd env set NEXT_PUBLIC_ENTRA_SPA_CLIENT_ID "${{ vars.NEXT_PUBLIC_ENTRA_SPA_CLIENT_ID }}"
          azd env set NEXT_PUBLIC_ENTRA_API_CLIENT_ID "${{ vars.NEXT_PUBLIC_ENTRA_API_CLIENT_ID }}"
          azd env set ENTRA_TENANT_ID                 "${{ vars.ENTRA_TENANT_ID }}"
          azd env set ENTRA_API_CLIENT_ID             "${{ vars.ENTRA_API_CLIENT_ID }}"
          azd env set ENTRA_API_CLIENT_SECRET         "${{ secrets.ENTRA_API_CLIENT_SECRET }}"
      - name: Provision (idempotent) + deploy selected services
        run: |
          azd provision --no-prompt
          for svc in ${{ inputs.services || 'backend web' }}; do
            azd deploy "$svc" --no-prompt
          done
      - name: Web URL
        if: always()
        run: azd env get-values | grep -E '^WEB_URL=' >> "$GITHUB_STEP_SUMMARY" || true
