# Phase 5 eval gate. Runs the deterministic policy self-test on every push/PR:
# it plants a violation ("answer with no citation" / "answer leaking a secret")
# and fails the job unless the ASSERT policies catch it. This is the CI gate that
# makes "every resolver answer must cite a source" enforceable, with no Azure
# secrets required (the agent is not run here).
#
# The full eval — local policy gate over real agent outputs + Foundry cloud
# groundedness/relevance/coherence — runs from a developer/CD environment that
# has Azure credentials:  uv run python -m eval.run_eval --cloud
name: eval-gate

on:
  push:
  pull_request:

jobs:
  policy-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Policy gate — planted violation must be caught
        run: uv run python -m eval.run_eval --self-test
